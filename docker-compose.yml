services:
  postgres:
    image: postgres:16-alpine
    container_name: file-service-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fileservice
      POSTGRES_PASSWORD: fileservice
      POSTGRES_DB: fileservice
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
