<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- PPT 主题/东亚字体在 Linux 容器内的回退 -->
  <alias binding="strong">
    <family>新細明體</family>
    <prefer><family>Noto Sans CJK TC</family></prefer>
  </alias>
  <alias binding="strong">
    <family>PMingLiU</family>
    <prefer><family>Noto Sans CJK TC</family></prefer>
  </alias>
  <alias binding="strong">
    <family>宋体</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <alias binding="strong">
    <family>SimSun</family>
    <prefer><family>Noto Sans CJK SC</family></prefer>
  </alias>
  <!-- 西文字体无中文 glyph 时回退到繁体黑体 -->
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-TW</string></test>
    <test name="family" compare="eq"><string>Corbel</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh-CN</string></test>
    <test name="family" compare="eq"><string>Corbel</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>
  <match target="pattern">
    <test name="lang" compare="contains"><string>zh</string></test>
    <test name="family" compare="eq"><string>Lato</string></test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Sans CJK TC</string>
    </edit>
  </match>
</fontconfig>
