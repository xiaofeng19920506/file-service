# 本地基础设施：Postgres + Redis；可选 Worker（含 LibreOffice，profile: libre）
# 用法（在仓库根目录）：
#   docker compose -f shared/docker-compose.yml up -d postgres redis
#   docker compose -f shared/docker-compose.yml --profile libre up --build -d worker

services:
  postgres:
    image: postgres:16-alpine
    container_name: file-service-db
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: fileservice
      POSTGRES_PASSWORD: fileservice
      POSTGRES_DB: fileservice
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  worker:
    profiles: [libre]
    build:
      context: ..
      dockerfile: shared/docker/Dockerfile.worker
    depends_on:
      - postgres
      - redis
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://fileservice:fileservice@postgres:5432/fileservice
      REDIS_URL: redis://redis:6379
      STORAGE_BACKEND: fs
      LOCAL_STORAGE_DIR: /data/storage
      SOFFICE_PATH: soffice
    volumes:
      - ../data/storage:/data/storage
    deploy:
      resources:
        limits:
          memory: 1536M

volumes:
  postgres_data:
