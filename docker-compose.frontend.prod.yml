# 前端独立部署：Nginx 静态站点
# 构建时通过 VITE_API_URL 指向后端 API 地址，例如 https://api.example.com
# 用法：VITE_API_URL=https://api.example.com docker compose -f docker-compose.frontend.prod.yml up --build -d

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_API_KEY: ${VITE_API_KEY:-}
    restart: unless-stopped
    ports:
      - '${WEB_PORT:-8080}:80'
